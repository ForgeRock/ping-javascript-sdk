<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      /* ── Reset ──────────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --base: #0d1117;
        --surface: #161b22;
        --raised: #21262d;
        --hover: #1a2332;
        --sel: #1c2d42;
        --border: #30363d;
        --bdim: #1c2128;
        --text: #e6edf3;
        --muted: #8b949e;
        --dim: #484f58;
        --blue: #58a6ff;
        --green: #3fb950;
        --red: #f85149;
        --orange: #ffa657;
        --yellow: #d29922;
        --purple: #bc8cff;
        --font-ui: 'Segoe UI', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        --font-mono: 'Cascadia Code', 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;

        /* panel sizes — written by panel.ts resize logic */
        --graph-w: 220px;
        --insp-h: 220px;
        --toolbar-h: 32px;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
        background: var(--base);
        color: var(--text);
        font-family: var(--font-ui);
        font-size: 12px;
        line-height: 1.4;
      }

      /* ── Scrollbars ─────────────────────────────────────────── */
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--raised);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--border);
      }

      /* ── Layout ─────────────────────────────────────────────── */
      .layout {
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }
      .timeline-layout {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }
      .main-area {
        display: flex;
        flex: 1;
        overflow: hidden;
        min-height: 0;
      }
      .graph-panel {
        width: var(--graph-w);
        flex-shrink: 0;
        background: var(--surface);
        border-right: 1px solid var(--border);
        overflow-y: auto;
        overflow-x: hidden;
        padding: 4px 0;
      }
      .timeline-panel {
        flex: 1;
        overflow-y: auto;
        background: var(--base);
        min-width: 0;
      }
      .inspector-panel {
        height: var(--insp-h);
        flex-shrink: 0;
        background: var(--surface);
        border-top: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Toolbar ─────────────────────────────────────────────── */
      .toolbar {
        display: flex;
        align-items: center;
        height: 32px;
        padding: 0 8px;
        gap: 4px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        user-select: none;
      }
      .tb-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        height: 22px;
        padding: 0 9px;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--muted);
        font-size: 11px;
        font-family: var(--font-ui);
        cursor: pointer;
        transition:
          color 0.12s,
          border-color 0.12s,
          background 0.12s;
        white-space: nowrap;
      }
      .tb-btn:hover {
        color: var(--text);
        border-color: var(--muted);
        background: var(--raised);
      }
      .tb-btn.recording {
        color: var(--red);
        border-color: var(--red);
      }
      .tb-btn.recording:hover {
        background: rgba(248, 81, 73, 0.1);
      }

      .rec-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--red);
        flex-shrink: 0;
        animation: blink 1.4s ease-in-out infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.25;
        }
      }

      .tb-sep {
        width: 1px;
        height: 16px;
        background: var(--border);
        margin: 0 3px;
        flex-shrink: 0;
      }
      .tb-spacer {
        flex: 1;
      }

      .event-count {
        font-size: 11px;
        font-family: var(--font-mono);
        color: var(--dim);
      }
      .flow-chip {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        height: 20px;
        padding: 0 8px;
        background: var(--raised);
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 10px;
        color: var(--muted);
      }
      .flow-chip-id {
        font-family: var(--font-mono);
        color: var(--blue);
        letter-spacing: 0.02em;
      }
      .no-flow {
        font-size: 11px;
        color: var(--dim);
      }

      /* ── Error Banner ────────────────────────────────────────── */
      .err-banner {
        padding: 5px 12px;
        background: rgba(248, 81, 73, 0.08);
        color: var(--red);
        font-family: var(--font-mono);
        font-size: 11px;
        border-bottom: 1px solid rgba(248, 81, 73, 0.25);
        flex-shrink: 0;
      }

      /* ── Timeline Header ─────────────────────────────────────── */
      .tl-header {
        position: sticky;
        top: 0;
        display: flex;
        align-items: center;
        padding: 0 10px;
        height: 24px;
        gap: 10px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        font-size: 10px;
        color: var(--dim);
        text-transform: uppercase;
        letter-spacing: 0.07em;
        user-select: none;
        z-index: 1;
      }
      .tl-hdr-label {
        color: var(--dim) !important;
        background: none !important;
        font-weight: 600 !important;
        font-size: 10px !important;
        font-family: var(--font-ui) !important;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        overflow: visible;
        white-space: nowrap;
        text-overflow: clip;
      }

      /* ── Timeline Rows ───────────────────────────────────────── */
      .tl-row {
        display: flex;
        align-items: center;
        padding: 0 10px;
        height: 26px;
        cursor: pointer;
        border-bottom: 1px solid var(--bdim);
        gap: 10px;
        transition: background-color 0.07s;
      }
      .tl-row:hover {
        background: var(--hover);
      }
      .tl-row.sel {
        background: var(--sel);
      }
      .tl-row.sel:hover {
        background: var(--sel);
      }

      /* type badge */
      .tl-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 30px;
        height: 15px;
        border-radius: 3px;
        font-size: 9px;
        font-weight: 700;
        font-family: var(--font-mono);
        letter-spacing: 0.03em;
        flex-shrink: 0;
      }
      .b-net {
        background: rgba(88, 166, 255, 0.1);
        color: var(--blue);
      }
      .b-sdk {
        background: rgba(63, 185, 80, 0.1);
        color: var(--green);
      }
      .b-ses {
        background: rgba(255, 166, 87, 0.1);
        color: var(--orange);
      }
      .b-cfg {
        background: rgba(188, 140, 255, 0.1);
        color: var(--purple);
      }

      /* status col */
      .tl-st {
        font-size: 11px;
        font-family: var(--font-mono);
        font-weight: 600;
        width: 42px;
        text-align: right;
        flex-shrink: 0;
      }
      .st-ok {
        color: var(--green);
      }
      .st-warn {
        color: var(--yellow);
      }
      .st-err {
        color: var(--red);
      }
      .st-nil {
        color: var(--dim);
      }

      /* method col */
      .tl-meth {
        font-size: 10px;
        font-family: var(--font-mono);
        font-weight: 700;
        width: 50px;
        flex-shrink: 0;
        letter-spacing: 0.03em;
      }
      .m-get {
        color: var(--green);
      }
      .m-post {
        color: var(--blue);
      }
      .m-put {
        color: var(--yellow);
      }
      .m-patch {
        color: var(--orange);
      }
      .m-del {
        color: var(--red);
      }
      .m-other {
        color: var(--muted);
      }

      /* description / url */
      .tl-desc {
        flex: 1;
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text);
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        min-width: 0;
      }
      .tl-desc.dim {
        color: var(--muted);
      }

      /* inline tags — never clip, always size to content */
      .tl-tag {
        display: inline-flex;
        align-items: center;
        height: 14px;
        padding: 0 5px;
        border-radius: 2px;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.04em;
        flex-shrink: 0;
        white-space: nowrap;
        overflow: visible;
      }
      .tag-cors {
        background: rgba(248, 81, 73, 0.12);
        color: var(--red);
      }
      .tag-coll {
        background: rgba(88, 166, 255, 0.12);
        color: var(--blue);
      }

      /* duration */
      .tl-dur {
        font-size: 10px;
        font-family: var(--font-mono);
        color: var(--dim);
        width: 48px;
        text-align: right;
        flex-shrink: 0;
      }

      /* ── Inspector Tabs ──────────────────────────────────────── */
      .tab-bar {
        display: flex;
        align-items: flex-end;
        height: 32px;
        padding: 0 2px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        flex-shrink: 0;
        overflow-x: auto;
      }
      .tab-bar::-webkit-scrollbar {
        height: 0;
      }
      .tab-btn {
        display: inline-flex;
        align-items: center;
        height: 28px;
        padding: 0 12px;
        background: transparent;
        border: none;
        border-bottom: 2px solid transparent;
        color: var(--muted);
        font-size: 11px;
        font-family: var(--font-ui);
        cursor: pointer;
        white-space: nowrap;
        transition:
          color 0.12s,
          border-color 0.12s;
        margin-bottom: -1px;
      }
      .tab-btn:hover {
        color: var(--text);
      }
      .tab-btn.active {
        color: var(--blue);
        border-bottom-color: var(--blue);
      }

      /* ── Inspector Content ───────────────────────────────────── */
      .insp-body {
        flex: 1;
        overflow-y: auto;
        padding: 10px 12px;
        font-size: 12px;
      }
      .insp-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--dim);
        font-size: 12px;
      }

      .sect-hdr {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--dim);
        margin: 10px 0 4px;
        padding-bottom: 4px;
        border-bottom: 1px solid var(--bdim);
      }
      .sect-hdr:first-child {
        margin-top: 0;
      }

      .kv-row {
        display: flex;
        align-items: baseline;
        gap: 8px;
        padding: 2px 0;
        font-family: var(--font-mono);
        font-size: 11px;
        min-height: 20px;
      }
      .kv-key {
        color: var(--muted);
        min-width: 100px;
        flex-shrink: 0;
        font-size: 10px;
        padding-top: 1px;
      }
      .kv-val {
        color: var(--text);
        flex: 1;
        word-break: break-all;
      }
      .kv-ok {
        color: var(--green);
      }
      .kv-err {
        color: var(--red);
      }
      .kv-cont {
        color: var(--blue);
      }
      .kv-bold {
        font-weight: 700;
      }

      .kv-arrow {
        color: var(--dim);
      }

      /* caused-by link button */
      .cause-btn {
        background: var(--raised);
        border: 1px solid var(--blue);
        border-radius: 3px;
        color: var(--blue);
        font-family: var(--font-mono);
        font-size: 11px;
        padding: 1px 7px;
        cursor: pointer;
        transition: background 0.12s;
      }
      .cause-btn:hover {
        background: rgba(88, 166, 255, 0.1);
      }

      /* collector card */
      .coll-card {
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 8px 10px;
        margin-bottom: 8px;
        background: rgba(0, 0, 0, 0.2);
      }
      .coll-card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 4px;
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
      }
      .coll-copy-all-row {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 6px;
      }
      .fv-copy-btn {
        background: none;
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--muted);
        cursor: pointer;
        font-size: 11px;
        padding: 1px 5px;
        line-height: 1;
      }
      .fv-copy-btn:hover {
        color: var(--fg);
        border-color: var(--fg);
      }
      .coll-copy-all {
        font-size: 10px;
        padding: 2px 8px;
      }

      /* ── JsonTree ────────────────────────────────────────────── */
      .jt-sec {
        margin-bottom: 14px;
      }
      .jt-label {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--dim);
        margin-bottom: 4px;
      }
      .jt-tree {
        font-family: var(--font-mono);
        font-size: 11px;
        line-height: 1.65;
      }
      .jt-key {
        color: var(--blue);
      }
      .jt-auth {
        color: var(--orange);
        font-weight: 700;
      }
      .jt-str {
        color: var(--green);
      }
      .jt-num {
        color: var(--orange);
      }
      .jt-bool {
        color: var(--purple);
      }
      .jt-null {
        color: var(--dim);
        font-style: italic;
      }
      .jt-punct {
        color: var(--muted);
      }
      .jt-err {
        color: var(--red);
        font-size: 11px;
      }
      .jt-errmsg {
        color: var(--dim);
        font-size: 10px;
        margin-top: 2px;
      }

      /* ── JWT Decoder ─────────────────────────────────────────── */
      .jwt-details {
        display: inline;
      }
      .jwt-summary {
        display: inline-flex;
        align-items: center;
        cursor: pointer;
        user-select: none;
        font-family: var(--font-mono);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: var(--purple);
        background: rgba(188, 140, 255, 0.1);
        border: 1px solid rgba(188, 140, 255, 0.3);
        border-radius: 3px;
        padding: 1px 6px;
        list-style: none;
      }
      .jwt-summary::-webkit-details-marker {
        display: none;
      }
      .jwt-summary::before {
        content: '▶ ';
        font-size: 8px;
        margin-right: 2px;
      }
      details[open] > .jwt-summary::before {
        content: '▼ ';
      }
      .jwt-body {
        margin-top: 6px;
        padding: 8px 10px;
        background: rgba(188, 140, 255, 0.04);
        border: 1px solid rgba(188, 140, 255, 0.15);
        border-radius: 4px;
        font-family: var(--font-mono);
        font-size: 11px;
        line-height: 1.65;
      }
      .jwt-section-hdr {
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--dim);
        margin: 6px 0 3px;
        padding-bottom: 2px;
        border-bottom: 1px solid var(--bdim);
      }
      .jwt-section-hdr:first-child {
        margin-top: 0;
      }
      .jwt-kv {
        display: flex;
        gap: 8px;
        padding: 1px 0;
      }
      .jwt-k {
        color: var(--blue);
        min-width: 80px;
        flex-shrink: 0;
        font-size: 10px;
      }
      .jwt-v {
        color: var(--green);
        word-break: break-all;
      }
      .jwt-v-num {
        color: var(--orange);
      }
      .jwt-v-bool {
        color: var(--purple);
      }
      .jwt-v-null {
        color: var(--dim);
        font-style: italic;
      }
      .jwt-v-date {
        color: var(--muted);
        font-size: 10px;
        margin-left: 6px;
      }
      .jwt-expired {
        display: inline-flex;
        align-items: center;
        background: rgba(248, 81, 73, 0.15);
        color: var(--red);
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.05em;
        border-radius: 3px;
        padding: 1px 5px;
        margin-left: 6px;
      }
      .jwt-sig {
        color: var(--dim);
        font-style: italic;
        font-size: 10px;
      }
      .jwt-err {
        color: var(--red);
        font-size: 10px;
        font-style: italic;
      }

      /* ── Flow View ───────────────────────────────────────── */
      .fv-view {
        display: flex;
        flex-direction: column;
        flex: 1;
        overflow: hidden;
      }
      .fv-rail {
        flex-shrink: 0;
        height: 110px;
        overflow-x: auto;
        overflow-y: hidden;
        border-bottom: 1px solid var(--border);
        background: var(--base);
      }
      .fv-rail-empty {
        height: 110px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--dim);
        font-size: 12px;
      }
      .fv-detail {
        flex: 1;
        overflow-y: auto;
        padding: 12px 16px;
      }
      .fv-detail-empty {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--dim);
        font-size: 12px;
        font-style: italic;
        padding: 24px;
      }
      .fv-net-group {
        border: 1px solid var(--border);
        border-radius: 4px;
        margin-bottom: 12px;
        overflow: hidden;
      }
      .fv-net-group-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        background: var(--raised);
      }
      .fv-node-label {
        font-size: 12px;
        font-weight: 600;
        color: var(--text);
      }
      .fv-net-status {
        font-size: 11px;
        font-family: var(--font-mono);
        min-width: 30px;
        text-align: right;
      }
      .fv-net-url {
        flex: 1;
        color: var(--text);
        font-size: 11px;
        font-family: var(--font-mono);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .fv-net-dur {
        color: var(--dim);
        font-size: 10px;
        min-width: 36px;
        text-align: right;
      }
      .fv-section-row {
        display: flex;
        align-items: center;
        padding: 5px 10px;
        cursor: pointer;
        border-top: 1px solid var(--bdim);
        color: var(--muted);
        font-size: 11px;
        user-select: none;
      }
      .fv-section-row:hover {
        background: var(--hover);
        color: var(--text);
      }
      .fv-section-body {
        padding: 8px 10px;
        border-top: 1px solid var(--bdim);
        background: var(--base);
      }
      .fv-no-data {
        padding: 6px 10px;
        color: var(--dim);
        font-size: 11px;
        font-style: italic;
        border-top: 1px solid var(--bdim);
      }
      .fv-playback-controls {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .fv-step-label {
        color: var(--muted);
        font-size: 11px;
        font-family: var(--font-mono);
      }
      .tb-mode-btn.active {
        background: var(--sel);
        color: var(--blue);
        border-color: var(--blue);
      }

      /* ── Flow Health Panel ──────────────────────────────────────── */
      .fh-panel {
        flex-shrink: 0;
        border-bottom: 1px solid var(--border);
        font-size: 11px;
      }
      .fh-error {
        background: rgba(248, 81, 73, 0.08);
        border-left: 3px solid var(--red);
      }
      .fh-warning {
        background: rgba(210, 153, 34, 0.08);
        border-left: 3px solid var(--yellow);
      }
      .fh-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 10px;
      }
      .fh-title {
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        font-size: 10px;
        letter-spacing: 0.06em;
      }
      .fh-summary {
        flex: 1;
        color: var(--text);
      }
      .fh-error .fh-summary {
        color: var(--red);
      }
      .fh-warning .fh-summary {
        color: var(--yellow);
      }
      .fh-collapse-btn {
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 10px;
        padding: 2px 4px;
      }
      .fh-collapse-btn:hover {
        color: var(--text);
      }
      .fh-issues {
        padding: 0 10px 8px;
      }
      .fh-issue {
        padding: 4px 8px;
        margin-bottom: 4px;
        border-radius: 4px;
        cursor: pointer;
        border: 1px solid transparent;
      }
      .fh-issue:hover {
        border-color: var(--border);
        background: var(--raised);
      }
      .fh-issue-error {
        border-left: 2px solid var(--red);
        padding-left: 6px;
      }
      .fh-issue-warning {
        border-left: 2px solid var(--yellow);
        padding-left: 6px;
      }
      .fh-issue-info {
        border-left: 2px solid var(--blue);
        padding-left: 6px;
      }
      .fh-issue-cat {
        color: var(--muted);
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      .fh-issue-title {
        color: var(--text);
        font-weight: 500;
      }
      .fh-issue-error .fh-issue-title {
        color: var(--red);
      }
      .fh-issue-warning .fh-issue-title {
        color: var(--yellow);
      }
      .fh-issue-desc {
        color: var(--muted);
        font-size: 10px;
        margin-top: 2px;
        padding-left: 2px;
      }

      /* ── Diagnosis Tab ──────────────────────────────────────── */
      .diag-issue {
        padding: 8px 10px;
        margin-bottom: 6px;
        border-radius: 4px;
        border-left: 2px solid var(--border);
      }
      .diag-issue-error {
        border-left-color: var(--red);
        background: rgba(248, 81, 73, 0.06);
      }
      .diag-issue-warning {
        border-left-color: var(--yellow);
        background: rgba(210, 153, 34, 0.06);
      }
      .diag-issue-info {
        border-left-color: var(--blue);
      }
      .diag-title {
        font-weight: 600;
        color: var(--text);
        margin-bottom: 3px;
      }
      .diag-issue-error .diag-title {
        color: var(--red);
      }
      .diag-issue-warning .diag-title {
        color: var(--yellow);
      }
      .diag-desc {
        color: var(--muted);
        font-size: 11px;
        margin-bottom: 4px;
      }
      .diag-steps-hdr {
        font-size: 10px;
        font-weight: 600;
        color: var(--dim);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin: 4px 0 2px;
      }
      .diag-step {
        color: var(--text);
        font-size: 11px;
        padding: 1px 0 1px 8px;
      }
      .diag-data {
        margin-top: 6px;
        border-top: 1px solid var(--bdim);
        padding-top: 4px;
      }
      .diag-kv {
        display: flex;
        gap: 8px;
        padding: 1px 0;
      }
      .diag-k {
        color: var(--muted);
        font-family: var(--font-mono);
        font-size: 10px;
        min-width: 120px;
      }
      .diag-v {
        color: var(--orange);
        font-family: var(--font-mono);
        font-size: 10px;
      }

      /* ── Graph Panel ─────────────────────────────────────────── */
      .graph-panel-label {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--dim);
        padding: 6px 12px 2px;
      }
      .graph-empty {
        padding: 16px 12px;
        font-size: 11px;
        color: var(--dim);
        text-align: center;
      }
      .graph-svg {
        display: block;
      }

      /* pulsing selection ring */
      .graph-ring {
        animation: ring-pulse 2s ease-in-out infinite;
      }
      @keyframes ring-pulse {
        0%,
        100% {
          opacity: 0.6;
        }
        50% {
          opacity: 0.15;
        }
      }

      /* ── Resize handles ──────────────────────────────────────── */
      /*
       * Handles live outside #app (appended to body by panel.ts) so Elm's
       * virtual DOM never touches them. They are positioned fixed so they
       * always sit on top of the panel border regardless of scroll.
       */
      .resize-handle {
        position: fixed;
        z-index: 1000;
        background: transparent;
        transition: background 0.15s;
      }
      .resize-handle::after {
        content: '';
        position: absolute;
        background: transparent;
        transition: background 0.15s;
        border-radius: 2px;
      }
      .resize-handle:hover::after,
      .resize-handle.dragging::after {
        background: var(--blue);
      }

      /* vertical handle — sits on the right edge of the graph panel */
      .resize-handle-v {
        top: 0;
        left: var(--graph-w);
        width: 5px;
        height: 100%;
        cursor: col-resize;
        transform: translateX(-2px);
      }
      .resize-handle-v::after {
        top: 10%;
        left: 2px;
        width: 1px;
        height: 80%;
      }

      /* horizontal handle — sits on the top edge of the inspector panel */
      .resize-handle-h {
        bottom: var(--insp-h);
        left: 0;
        width: 100%;
        height: 5px;
        cursor: row-resize;
        transform: translateY(2px);
      }
      .resize-handle-h::after {
        left: 10%;
        top: 2px;
        width: 80%;
        height: 1px;
      }

      /* prevent text selection while dragging */
      body.resizing {
        user-select: none;
      }

      /* ── Export dropdown ──────────────────────────────── */
      .tb-dropdown {
        position: relative;
        display: inline-flex;
      }
      .tb-dropdown-menu {
        position: absolute;
        top: 100%;
        left: 0;
        z-index: 100;
        background: var(--bg-2, #252526);
        border: 1px solid var(--border, #3c3c3c);
        border-radius: 4px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        min-width: 140px;
        padding: 2px 0;
      }
      .tb-dropdown-item {
        display: block;
        width: 100%;
        padding: 4px 12px;
        text-align: left;
        background: none;
        border: none;
        color: var(--fg, #ccc);
        cursor: pointer;
        font-size: 11px;
      }
      .tb-dropdown-item:hover {
        background: var(--bg-hover, #2a2d2e);
      }

      /* ── Snapshot dropdown ────────────────────────────────── */
      .tb-dropdown-arrow {
        padding: 0 5px;
        margin-left: -1px;
        border-top-left-radius: 0;
        border-bottom-left-radius: 0;
      }
      .snapshot-menu {
        min-width: 260px;
      }
      .snapshot-empty {
        padding: 8px 12px;
        color: var(--dim);
        font-size: 11px;
        font-style: italic;
      }
      .snapshot-item {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 0 4px 0 0;
      }
      .snapshot-item-info {
        flex: 1;
        padding: 5px 12px;
        cursor: pointer;
        font-size: 11px;
        color: var(--text);
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }
      .snapshot-item-info:hover {
        background: var(--hover);
      }
      .snapshot-flow {
        font-family: var(--font-mono);
        color: var(--blue);
      }
      .snapshot-meta {
        color: var(--muted);
      }
      .snapshot-delete {
        background: none;
        border: none;
        color: var(--dim);
        cursor: pointer;
        font-size: 11px;
        padding: 2px 6px;
        border-radius: 3px;
        flex-shrink: 0;
      }
      .snapshot-delete:hover {
        color: var(--red);
        background: rgba(248, 81, 73, 0.1);
      }

      /* ── Import banner ────────────────────────────────── */
      .import-banner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 4px 12px;
        background: var(--bg-info, #063b49);
        border-bottom: 1px solid var(--border, #3c3c3c);
        font-size: 11px;
        color: var(--fg, #ccc);
      }
      .import-banner-clear {
        background: none;
        border: 1px solid var(--border, #3c3c3c);
        color: var(--fg, #ccc);
        padding: 1px 8px;
        border-radius: 3px;
        cursor: pointer;
        font-size: 10px;
      }
      .import-banner-clear:hover {
        background: var(--bg-hover, #2a2d2e);
      }

      /* ── Import paste panel ─────────────────────────────── */
      .import-paste {
        flex-shrink: 0;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }
      .import-paste-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 12px;
        font-size: 11px;
        color: var(--muted);
      }
      .import-paste-actions {
        display: flex;
        gap: 4px;
      }
      .import-paste-textarea {
        display: block;
        width: 100%;
        height: 80px;
        padding: 8px 12px;
        background: var(--base);
        border: none;
        border-top: 1px solid var(--border);
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 11px;
        resize: vertical;
        outline: none;
      }
      .import-paste-textarea::placeholder {
        color: var(--dim);
      }
      /* ── Learn Tab ──────────────────────────────────────── */
      .lv-view {
        display: flex;
        flex-direction: column;
        flex: 1;
        overflow: hidden;
      }
      .lv-rail {
        flex-shrink: 0;
        height: 110px;
        overflow-x: auto;
        overflow-y: hidden;
        border-bottom: 1px solid var(--border);
        background: var(--base);
      }
      .lv-rail-empty {
        height: 110px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--dim);
        font-size: 12px;
      }
      .lv-canvas {
        flex: 1;
        overflow: hidden;
        background: var(--base);
        cursor: grab;
      }
      .lv-canvas:active {
        cursor: grabbing;
      }
      .lv-canvas-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--dim);
        font-size: 12px;
        font-style: italic;
      }
      .lv-canvas-svg {
        display: block;
        width: 100%;
        height: 100%;
      }
      .lv-pulse {
        animation: ring-pulse 2s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="elm.js"></script>
    <script src="panel.js" type="module"></script>
  </body>
</html>
